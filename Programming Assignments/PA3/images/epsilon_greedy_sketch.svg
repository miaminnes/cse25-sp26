<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; fill: #111827; font-size: 18px; font-weight: 700; }
      .t { font-family: Arial, Helvetica, sans-serif; fill: #111827; font-size: 14px; }
      .s { font-family: Arial, Helvetica, sans-serif; fill: #374151; font-size: 13px; }
      .note { font-family: Arial, Helvetica, sans-serif; fill: #6b7280; font-size: 12px; }
    </style>
  </defs>

  <text x="20" y="32" class="title">ε-greedy action selection</text>
  <text x="20" y="55" class="note">With probability ε explore; otherwise exploit (pick argmax Q, break ties randomly).</text>

  <!-- bar -->
  <rect x="20" y="95" width="860" height="60" fill="#f3f4f6" stroke="#1f2937" stroke-width="2"/>
  <rect x="20" y="95" width="220" height="60" fill="#93c5fd" stroke="#1f2937" stroke-width="2"/>
  <rect x="240" y="95" width="640" height="60" fill="#a7f3d0" stroke="#1f2937" stroke-width="2"/>

  <text x="70" y="130" class="t">Explore</text>
  <text x="60" y="150" class="s">probability ε</text>

  <text x="500" y="130" class="t">Exploit</text>
  <text x="455" y="150" class="s">probability 1 − ε</text>

  <!-- axis markers -->
  <text x="20" y="180" class="note">0</text>
  <text x="225" y="180" class="note">ε</text>
  <text x="872" y="180" class="note">1</text>
</svg>
