<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="470" viewBox="0 0 1160 470" role="img" aria-labelledby="title desc">
  <title id="title">Nim state and legal actions</title>
  <desc id="desc">State (1, 3, 5) and legal actions grouped by pile.</desc>

  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 12; ry: 12; }
      .title { font: 700 24px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 14px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #475569; }
      .h { font: 700 15px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #0f172a; }
      .txt { font: 500 13px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #334155; }
      .tiny { font: 500 12px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #64748b; }
      .pilebox { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; ry: 8; }
      .rowline { stroke: #e2e8f0; stroke-width: 1; }
      .chip { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; rx: 7; ry: 7; }
      .c0 { fill: #3b82f6; }
      .c1 { fill: #06b6d4; }
      .c2 { fill: #8b5cf6; }
      .tag0 { fill: #dbeafe; }
      .tag1 { fill: #cffafe; }
      .tag2 { fill: #ede9fe; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1160" height="470"/>

  <text x="26" y="38" class="title">Nim: state and legal actions</text>
  <text x="26" y="60" class="subtitle">Action format is (i, k): choose pile index i and remove k objects from that pile.</text>

  <!-- Left: state panel -->
  <rect class="panel" x="24" y="84" width="470" height="348"/>
  <text x="44" y="112" class="h">Current state s = (1, 3, 5)</text>

  <rect class="pilebox" x="52" y="142" width="126" height="256"/>
  <rect class="pilebox" x="196" y="142" width="126" height="256"/>
  <rect class="pilebox" x="340" y="142" width="126" height="256"/>

  <rect class="tag0" x="66" y="152" width="98" height="24" rx="6" ry="6"/>
  <rect class="tag1" x="210" y="152" width="98" height="24" rx="6" ry="6"/>
  <rect class="tag2" x="354" y="152" width="98" height="24" rx="6" ry="6"/>

  <text x="96" y="169" class="txt">Pile 0</text>
  <text x="240" y="169" class="txt">Pile 1</text>
  <text x="384" y="169" class="txt">Pile 2</text>

  <!-- stones -->
  <circle cx="115" cy="376" r="13" class="c0"/>

  <circle cx="259" cy="376" r="13" class="c1"/>
  <circle cx="259" cy="342" r="13" class="c1"/>
  <circle cx="259" cy="308" r="13" class="c1"/>

  <circle cx="403" cy="376" r="13" class="c2"/>
  <circle cx="403" cy="342" r="13" class="c2"/>
  <circle cx="403" cy="308" r="13" class="c2"/>
  <circle cx="403" cy="274" r="13" class="c2"/>
  <circle cx="403" cy="240" r="13" class="c2"/>

  <text x="115" y="420" class="tiny" text-anchor="middle">count = 1</text>
  <text x="259" y="420" class="tiny" text-anchor="middle">count = 3</text>
  <text x="403" y="420" class="tiny" text-anchor="middle">count = 5</text>

  <!-- Right: legal-actions panel -->
  <rect class="panel" x="516" y="84" width="620" height="348"/>
  <text x="536" y="112" class="h">Legal actions from s = (1, 3, 5)</text>
  <text x="536" y="132" class="tiny">Grouped by pile. Each action (i, k) means remove k from pile i.</text>

  <!-- table header -->
  <rect x="536" y="150" width="584" height="30" fill="#f1f5f9" rx="7" ry="7"/>
  <text x="552" y="170" class="txt">Pile</text>
  <text x="648" y="170" class="txt">Objects in pile</text>
  <text x="790" y="170" class="txt">All legal actions for that pile</text>

  <!-- row 1 -->
  <line x1="536" y1="216" x2="1120" y2="216" class="rowline"/>
  <rect class="tag0" x="546" y="188" width="74" height="22" rx="6" ry="6"/>
  <text x="566" y="203" class="txt">Pile 0</text>
  <text x="666" y="203" class="txt">1</text>
  <text x="790" y="203" class="txt">(0,1)</text>

  <!-- row 2 -->
  <line x1="536" y1="252" x2="1120" y2="252" class="rowline"/>
  <rect class="tag1" x="546" y="224" width="74" height="22" rx="6" ry="6"/>
  <text x="566" y="239" class="txt">Pile 1</text>
  <text x="666" y="239" class="txt">3</text>
  <text x="790" y="239" class="txt">(1,1), (1,2), (1,3)</text>

  <!-- row 3 -->
  <line x1="536" y1="288" x2="1120" y2="288" class="rowline"/>
  <rect class="tag2" x="546" y="260" width="74" height="22" rx="6" ry="6"/>
  <text x="566" y="275" class="txt">Pile 2</text>
  <text x="666" y="275" class="txt">5</text>
  <text x="790" y="275" class="txt">(2,1), (2,2), (2,3), (2,4), (2,5)</text>

  <rect class="chip" x="536" y="314" width="584" height="106"/>
  <text x="550" y="338" class="txt">Examples:</text>
  <text x="550" y="364" class="txt">• (2,4): choose pile 2 and remove 4 objects.</text>
  <text x="550" y="390" class="txt">• (1,3): choose pile 1 and remove all 3 objects.</text>
</svg>
